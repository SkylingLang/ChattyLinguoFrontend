services:
  postgres:
    image: postgres:16-alpine
    container_name: chattylinguo-postgres
    environment:
      POSTGRES_DB: chattylinguo
      POSTGRES_USER: chatty
      POSTGRES_PASSWORD: chatty_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatty -d chattylinguo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

